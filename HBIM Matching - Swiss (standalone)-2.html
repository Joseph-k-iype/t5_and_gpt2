  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;

    let bin = '';

    // events at the element — warn only; real JS errors carry message/error.

      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    let template = JSON.parse(templateEl.textContent);

    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageTexts = {};

    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded

    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.

      ? window.origin
      : '*';

      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.

        (e.origin === 'null' &&

            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')

    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down

      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;

      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];

        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }

    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {

      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;

        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }

        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.

      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'

        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;

    setStatus('Unpacking ' + uuids.length + ' assets...');

        }

    const resourceMap = {};
    for (const entry of extResources) {

    }

    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {

    }

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.

      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:11px;letter-spacing:1px;font-weight:700;color:var(--red);margin-top:7px\">ATTRIBUTE NAME IS REQUIRED<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"font-size:11.5px;color:var(--sub);margin-top:7px\">The data attribute name from your source system<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <label style=\"display:block;font-size:10px;letter-spacing:1.6px;font-weight:700;margin-bottom:8px\">ATTRIBUTE DEFINITION <span style=\"font-weight:500;color:var(--sub);letter-spacing:0.5px;text-transform:none\">— strongly preferred<\u002Fspan><\u002Flabel>\n          <textarea rows=\"4\" placeholder=\"A unique identifier assigned to each customer account…\" style=\"width:100%;box-sizing:border-box;font-family:inherit;font-size:13px;line-height:1.5;padding:12px 14px;border:1px solid var(--ink);border-radius:0;outline:none;resize:vertical;background:var(--bg);color:var(--ink)\" style-focus=\"border-color:var(--red);box-shadow:inset 0 -2px 0 var(--red)\"><\u002Ftextarea>\n          <div style=\"font-size:11.5px;color:var(--sub);margin-top:7px\">A clear business definition significantly improves match accuracy — especially for cryptic field names<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <label style=\"display:block;font-size:10px;letter-spacing:1.6px;font-weight:700;margin-bottom:8px\">SOURCE ENTITY CONTEXT <span style=\"font-weight:500;color:var(--sub);letter-spacing:0.5px\">— optional hint<\u002Fspan><\u002Flabel>\n          <input type=\"text\" placeholder=\"e.g. Customer Account\" style=\"width:100%;box-sizing:border-box;font-family:inherit;font-size:13px;padding:12px 14px;border:1px solid var(--ink);border-radius:0;outline:none;background:var(--bg);color:var(--ink)\" style-focus=\"border-color:var(--red);box-shadow:inset 0 -2px 0 var(--red)\">\n          <div style=\"font-size:11.5px;color:var(--sub);margin-top:7px\">The source entity or table this attribute belongs to — used as a hint, not the answer<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px\">\n          <div>\n            <label style=\"display:block;font-size:10px;letter-spacing:1.6px;font-weight:700;margin-bottom:8px\">REQUESTING SYSTEM<\u002Flabel>\n            <sc-raw-select style=\"width:100%;font-family:inherit;font-size:13px;padding:12px 14px;border:1px solid var(--ink);border-radius:0;background:var(--bg);color:var(--ink);outline:none\" style-focus=\"outline:2px solid var(--red);outline-offset:2px\">\n              <option>Select system<\u002Foption><option>CIB<\u002Foption><option>CLM<\u002Foption><option>QA Hub<\u002Foption><option>Risk<\u002Foption>\n            <\u002Fsc-raw-select>\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:10px;letter-spacing:1.6px;font-weight:700;margin-bottom:8px\">SOURCE SYSTEM<\u002Flabel>\n            <input type=\"text\" placeholder=\"e.g. CIB\" style=\"width:100%;box-sizing:border-box;font-family:inherit;font-size:13px;padding:12px 14px;border:1px solid var(--ink);border-radius:0;outline:none;background:var(--bg);color:var(--ink)\" style-focus=\"border-color:var(--red);box-shadow:inset 0 -2px 0 var(--red)\">\n            <div style=\"font-size:11.5px;color:var(--sub);margin-top:7px\">The originating data source or business line<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:18px;margin-top:6px\">\n          <button sc-camel-on-click=\"{{ onSubmit }}\" style=\"font-family:inherit;font-size:11px;letter-spacing:1.8px;font-weight:700;color:#fff;background:var(--red);border:none;border-radius:0;padding:15px 32px;cursor:pointer\" style-hover=\"background:var(--redh)\" style-focus=\"outline:2px solid var(--ink);outline-offset:2px\">SUBMIT MATCH →<\u002Fbutton>\n          <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"font-size:11px;letter-spacing:1.2px;font-weight:700;border:1px solid var(--ink);padding:8px 14px\">QUEUED — RESULT IN MY VIEW<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isBatch }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-row=\"1\" style=\"flex:1 1 420px;max-width:560px;display:flex;flex-direction:column;gap:26px\">\n        <label sc-camel-on-drop=\"{{ onDrop }}\" sc-camel-on-drag-over=\"{{ onDragOver }}\" style=\"display:block;border:1px dashed var(--ink);padding:56px 32px;text-align:center;cursor:pointer\" style-hover=\"border-color:var(--red);background:var(--redtint)\">\n          <input type=\"file\" accept=\".csv\" sc-camel-on-change=\"{{ onBatchFile }}\" style=\"display:none\">\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:1px\">DROP CSV FILE<\u002Fdiv>\n          <div style=\"font-size:12px;color:var(--sub);margin-top:8px\">or click to browse · max 500 rows per batch<\u002Fdiv>\n        <\u002Flabel>\n        <sc-if value=\"{{ hasBatch }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border:1px solid var(--ink);padding:16px 18px\">\n            <div style=\"font-size:11px;letter-spacing:1.4px;font-weight:700\">QUEUED — <span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:0\">{{ batchName }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:12px;color:var(--sub);margin-top:6px\">Parsed 24 rows · 22 valid · <span style=\"color:var(--red);font-weight:700\">2 missing attribute_name<\u002Fspan> — results will appear in My View<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div>\n          <div style=\"font-size:10px;letter-spacing:1.6px;font-weight:700;margin-bottom:10px\">EXPECTED COLUMNS<\u002Fdiv>\n          <div style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;line-height:2;color:var(--body)\">attribute_name<span style=\"color:var(--red)\">*<\u002Fspan> · attribute_definition · source_entity · source_system<\u002Fdiv>\n          <div style=\"margin-top:14px\"><a href=\"#\" style=\"font-size:11px;letter-spacing:1.2px;font-weight:700\">↓ DOWNLOAD TEMPLATE<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"flex:1 1 300px;max-width:420px;border-top:1px solid var(--ink);padding-top:14px\">\n        <div style=\"font-size:10px;letter-spacing:1.6px;font-weight:700;margin-bottom:24px;color:var(--sub)\">HOW MATCHING WORKS<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:28px;max-width:340px\">\n          <div data-row=\"1\" style=\"display:flex;gap:16px\"><span style=\"font-size:26px;font-weight:800;color:var(--red);line-height:1;flex:none\">1<\u002Fspan><div><div style=\"font-size:13px;font-weight:700\">Submit an attribute<\u002Fdiv><div style=\"font-size:12.5px;color:var(--sub);line-height:1.55;margin-top:4px;text-wrap:pretty\">Name plus definition. The richer the definition, the higher the confidence.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div data-row=\"1\" style=\"display:flex;gap:16px\"><span style=\"font-size:26px;font-weight:800;color:var(--red);line-height:1;flex:none\">2<\u002Fspan><div><div style=\"font-size:13px;font-weight:700\">Semantic inference<\u002Fdiv><div style=\"font-size:12.5px;color:var(--sub);line-height:1.55;margin-top:4px;text-wrap:pretty\">The LLM infers the HBIM object and property, scored 0–100.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div data-row=\"1\" style=\"display:flex;gap:16px\"><span style=\"font-size:26px;font-weight:800;color:var(--red);line-height:1;flex:none\">3<\u002Fspan><div><div style=\"font-size:13px;font-weight:700\">Match or orphan<\u002Fdiv><div style=\"font-size:12.5px;color:var(--sub);line-height:1.55;margin-top:4px;text-wrap:pretty\">No suitable property in HBIM raises an orphan for model stewardship review.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isOrphans }}\" hint-placeholder-val=\"{{ false }}\">\n  <section data-screen-label=\"Orphans\" style=\"padding:36px clamp(20px,4vw,40px) 56px clamp(20px,4vw,40px)\">\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px\">\n      <h1 style=\"margin:0;font-size:30px;font-weight:800;letter-spacing:-0.5px\">Orphans<\u002Fh1>\n      <span style=\"font-size:12px;color:var(--sub)\">Attributes with no suitable HBIM property — candidates for model change<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\">\n      <div style=\"font-size:10px;letter-spacing:1.6px;font-weight:700\">ORPHAN QUEUE<\u002Fdiv>\n      <sc-raw-select value=\"{{ orphanFilter }}\" sc-camel-on-change=\"{{ onOrphanFilter }}\" style=\"font-family:inherit;font-size:11px;letter-spacing:0.8px;font-weight:600;padding:7px 10px;border:1px solid var(--ink);background:var(--bg);color:var(--ink);border-radius:0\" style-focus=\"outline:2px solid var(--red);outline-offset:2px\">\n        <option value=\"all\">ALL STATUSES<\u002Foption>\n        <option value=\"NEW\">NEW<\u002Foption>\n        <option value=\"UNDER REVIEW\">UNDER REVIEW<\u002Foption>\n        <option value=\"PROMOTED\">PROMOTED<\u002Foption>\n      <\u002Fsc-raw-select>\n    <\u002Fdiv>\n    <div style=\"overflow-x:auto\">\n    <div style=\"min-width:900px\">\n    <div style=\"display:grid;grid-template-columns:1.6fr 2fr 80px 90px 130px 1.8fr;gap:12px;padding:10px 0;border-bottom:2px solid var(--ink);font-size:9.5px;letter-spacing:1.4px;font-weight:700;color:var(--sub)\">\n      <span>INPUT NAME<\u002Fspan><span>DEFINITION<\u002Fspan><span>SOURCE<\u002Fspan><span>RAISED<\u002Fspan><span>STATUS<\u002Fspan><span>SUGGESTED ACTION<\u002Fspan>\n    <\u002Fdiv>\n    <sc-for list=\"{{ orphanRows }}\" as=\"row\" hint-placeholder-count=\"5\">\n      <div data-row=\"1\" style=\"{{ row.style }}\">\n        <span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;overflow-wrap:anywhere\">{{ row.name }}<\u002Fspan>\n        <span style=\"font-size:12.5px;color:var(--body)\">{{ row.def }}<\u002Fspan>\n        <span style=\"font-size:12px\">{{ row.src }}<\u002Fspan>\n        <span style=\"font-size:12px;color:var(--sub);font-variant-numeric:tabular-nums\">{{ row.raised }}<\u002Fspan>\n        <span><span style=\"{{ row.tagStyle }}\">{{ row.tag }}<\u002Fspan><\u002Fspan>\n        <span style=\"font-size:12.5px;color:var(--body)\">{{ row.sug }} <span sc-camel-on-click=\"{{ row.goRec }}\" style=\"{{ row.linkStyle }}\" style-hover=\"text-decoration:underline\">VIEW PROPOSAL →<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding:14px 0;font-size:11px;letter-spacing:1px;color:var(--sub)\">SHOWING {{ orphanShown }} OF 11 TOTAL · 6 NEW · 3 UNDER REVIEW · 2 PROMOTED · OLDEST OPEN 7 DAYS<\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isRecs }}\" hint-placeholder-val=\"{{ false }}\">\n  <section data-screen-label=\"Recommendations\" style=\"padding:36px clamp(20px,4vw,40px) 56px clamp(20px,4vw,40px)\">\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px\">\n      <h1 style=\"margin:0;font-size:30px;font-weight:800;letter-spacing:-0.5px\">Recommendations<\u002Fh1>\n      <span style=\"font-size:12px;color:var(--sub)\">Model-change proposals generated from orphan clusters<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column\">\n      <sc-for list=\"{{ recRows }}\" as=\"rec\" hint-placeholder-count=\"3\">\n        <div data-row=\"1\" style=\"display:flex;flex-wrap:wrap;gap:24px;padding:26px 0;border-top:1px solid var(--ink);align-items:flex-start\">\n          <div style=\"flex:none;width:56px;font-size:30px;font-weight:800;color:var(--red);line-height:1\">{{ rec.no }}<\u002Fdiv>\n          <div style=\"flex:1 1 300px;min-width:0\">\n            <div style=\"font-size:16px;font-weight:700;letter-spacing:-0.2px\">{{ rec.title }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:var(--body);line-height:1.6;margin-top:8px;max-width:640px;text-wrap:pretty\">{{ rec.detail }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:16px;margin-top:12px\">\n              <span style=\"font-size:10.5px;letter-spacing:1.2px;color:var(--sub)\">{{ rec.meta }}<\u002Fspan>\n              <span sc-camel-on-click=\"{{ rec.goOrphans }}\" style=\"font-size:10.5px;letter-spacing:1.2px;font-weight:700;color:var(--red);cursor:pointer\" style-hover=\"text-decoration:underline\">VIEW ORPHANS →<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:none;margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:10px\">\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <span style=\"{{ rec.statusStyle }}\">{{ rec.status }}<\u002Fspan>\n              <span sc-camel-on-click=\"{{ rec.undo }}\" style=\"{{ rec.undoStyle }}\" style-hover=\"text-decoration:underline\">UNDO<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"{{ rec.btnStyle }}\">\n              <button sc-camel-on-click=\"{{ rec.accept }}\" style=\"font-family:inherit;font-size:10px;letter-spacing:1.4px;font-weight:700;color:var(--bg);background:var(--ink);border:none;border-radius:0;padding:10px 16px;cursor:pointer\" style-hover=\"background:var(--red);color:#fff\" style-focus=\"outline:2px solid var(--red);outline-offset:2px\">ACCEPT<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ rec.dismiss }}\" style=\"font-family:inherit;font-size:10px;letter-spacing:1.4px;font-weight:700;color:var(--ink);background:var(--bg);border:1px solid var(--ink);border-radius:0;padding:10px 16px;cursor:pointer\" style-hover=\"border-color:var(--red);color:var(--red)\" style-focus=\"outline:2px solid var(--red);outline-offset:2px\">DISMISS<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ false }}\">\n  <section data-screen-label=\"Settings\" style=\"padding:36px clamp(20px,4vw,40px) 56px clamp(20px,4vw,40px)\">\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px\">\n      <h1 style=\"margin:0;font-size:30px;font-weight:800;letter-spacing:-0.5px\">Settings<\u002Fh1>\n      <span style=\"font-size:12px;color:var(--sub)\">Matching engine configuration · {{ envLabel }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"max-width:680px;display:flex;flex-direction:column\">\n      <div data-row=\"1\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));gap:14px 32px;padding:22px 0;border-top:1px solid var(--ink);align-items:center\">\n        <div><div style=\"font-size:13px;font-weight:700\">Auto-match threshold<\u002Fdiv><div style=\"font-size:12px;color:var(--sub);margin-top:4px\">Below this score a match becomes an orphan · also drives the low-confidence flag in My View<\u002Fdiv><\u002Fdiv>\n        <sc-raw-select value=\"{{ settingsThreshold }}\" sc-camel-on-change=\"{{ onThreshold }}\" style=\"width:140px;font-family:inherit;font-size:13px;padding:10px 12px;border:1px solid var(--ink);border-radius:0;background:var(--bg);color:var(--ink);outline:none\" style-focus=\"outline:2px solid var(--red);outline-offset:2px\">\n          <option value=\"50\">50%<\u002Foption><option value=\"55\">55%<\u002Foption><option value=\"60\">60%<\u002Foption><option value=\"65\">65%<\u002Foption><option value=\"70\">70%<\u002Foption><option value=\"75\">75%<\u002Foption><option value=\"80\">80%<\u002Foption><option value=\"85\">85%<\u002Foption><option value=\"90\">90%<\u002Foption><option value=\"95\">95%<\u002Foption>\n        <\u002Fsc-raw-select>\n      <\u002Fdiv>\n      <div data-row=\"1\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));gap:14px 32px;padding:22px 0;border-top:1px solid var(--line);align-items:center\">\n        <div><div style=\"font-size:13px;font-weight:700\">Appearance<\u002Fdiv><div style=\"font-size:12px;color:var(--sub);margin-top:4px\">Light or dark interface theme<\u002Fdiv><\u002Fdiv>\n        <sc-raw-select value=\"{{ theme }}\" sc-camel-on-change=\"{{ onThemeSelect }}\" style=\"width:140px;font-family:inherit;font-size:13px;padding:10px 12px;border:1px solid var(--ink);border-radius:0;background:var(--bg);color:var(--ink);outline:none\" style-focus=\"outline:2px solid var(--red);outline-offset:2px\">\n          <option value=\"light\">light<\u002Foption><option value=\"dark\">dark<\u002Foption>\n        <\u002Fsc-raw-select>\n      <\u002Fdiv>\n      <div data-row=\"1\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));gap:14px 32px;padding:22px 0;border-top:1px solid var(--line);align-items:center\">\n        <div><div style=\"font-size:13px;font-weight:700\">Inference model<\u002Fdiv><div style=\"font-size:12px;color:var(--sub);margin-top:4px\">Semantic matching backend<\u002Fdiv><\u002Fdiv>\n        <span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12.5px\">hbim-semantic-v3<\u002Fspan>\n      <\u002Fdiv>\n      <div data-row=\"1\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));gap:14px 32px;padding:22px 0;border-top:1px solid var(--line);align-items:center\">\n        <div><div style=\"font-size:13px;font-weight:700\">Registered systems<\u002Fdiv><div style=\"font-size:12px;color:var(--sub);margin-top:4px\">Sources allowed to submit requests<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n          <span style=\"font-size:11px;letter-spacing:1px;font-weight:600;border:1px solid var(--ink);padding:6px 10px\">CIB<\u002Fspan>\n          <span style=\"font-size:11px;letter-spacing:1px;font-weight:600;border:1px solid var(--ink);padding:6px 10px\">CLM<\u002Fspan>\n          <span style=\"font-size:11px;letter-spacing:1px;font-weight:600;border:1px solid var(--ink);padding:6px 10px\">QA HUB<\u002Fspan>\n          <span style=\"font-size:11px;letter-spacing:1px;font-weight:600;border:1px solid var(--ink);padding:6px 10px\">RISK<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-row=\"1\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));gap:14px 32px;padding:22px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--ink);align-items:center\">\n        <div><div style=\"font-size:13px;font-weight:700\">API endpoint<\u002Fdiv><div style=\"font-size:12px;color:var(--sub);margin-top:4px\">POST match requests here<\u002Fdiv><\u002Fdiv>\n        <span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12.5px;color:var(--body)\">/api/v1/hbim/match<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fmain>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;confidenceThreshold&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:70,&quot;min&quot;:50,&quot;max&quot;:95,&quot;step&quot;:5,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Matching&quot;},&quot;darkMode&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Appearance&quot;},&quot;zebra&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Tables&quot;},&quot;envLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;GB-SU-DEV&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Environment&quot;}}\">\nclass Component extends DCLogic {\n  state = { page: 'dashboard', tab: 'single', filter: 'all', submitted: false, recStatus: {}, expanded: false, orphanFilter: 'all', attrName: '', attrError: false, batchName: '', thresholdOverride: null, themeOverride: null };\n\n  componentDidMount() { this.animatePage(); }\n  componentDidUpdate(prevProps, prevState) { if (prevState && (prevState.page !== this.state.page || prevState.tab !== this.state.tab)) this.animatePage(); }\n  animatePage() {\n    if (!window.gsap) return;\n    requestAnimationFrame(() => {\n      const g = window.gsap;\n      const sec = document.querySelector('section[data-screen-label]');\n      if (!sec) return;\n      g.fromTo(sec.children, { opacity: 0, y: 26 }, { opacity: 1, y: 0, duration: 0.55, stagger: 0.09, ease: 'power3.out', clearProps: 'opacity,transform' });\n      sec.querySelectorAll('[data-count]').forEach(el => {\n        const target = parseFloat(el.getAttribute('data-count'));\n        const suffix = el.getAttribute('data-suffix') || '';\n        const o = { v: 0 };\n        g.to(o, { v: target, duration: 1.2, ease: 'power2.out', delay: 0.15, onUpdate: () => { el.textContent = Math.round(o.v) + suffix; } });\n      });\n      const bars = sec.querySelectorAll('[data-bar]');\n      if (bars.length) g.fromTo(bars, { scaleX: 0 }, { scaleX: 1, transformOrigin: 'left center', duration: 0.9, stagger: 0.07, ease: 'power3.out', delay: 0.25, clearProps: 'transform' });\n      sec.querySelectorAll('polyline[data-line]').forEach(pl => {\n        let len = 1500; try { len = pl.getTotalLength(); } catch (e) {}\n        pl.style.strokeDasharray = len; pl.style.strokeDashoffset = len;\n        g.to(pl, { strokeDashoffset: 0, duration: 1.6, ease: 'power2.inOut', delay: 0.3 });\n      });\n      const rows = sec.querySelectorAll('[data-row]');\n      if (rows.length) g.fromTo(rows, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.45, stagger: 0.055, ease: 'power2.out', delay: 0.2, clearProps: 'opacity,transform' });\n    });\n  }\n\n  renderVals() {\n    const theme = this.state.themeOverride ?? ((this.props.darkMode ?? false) ? 'dark' : 'light');\n    const threshold = this.state.thresholdOverride ?? this.props.confidenceThreshold ?? 70;\n    const zebra = this.props.zebra ?? false;\n    const page = this.state.page;\n    const RED = 'var(--red)', INK = 'var(--ink)', SUB = 'var(--sub)', BG = 'var(--bg)';\n\n    const NAV = [\n      ['dashboard', 'Dashboard'], ['myview', 'My View'], ['match', 'Match'],\n      ['orphans', 'Orphans'], ['recs', 'Recommendations'], ['settings', 'Settings']\n    ];\n    const nav = NAV.map(([key, label]) => ({\n      label,\n      go: () => this.setState({ page: key }),\n      style: {\n        padding: '11px 20px', fontSize: '13px', cursor: 'pointer', userSelect: 'none',\n        fontWeight: page === key ? 700 : 500,\n        color: page === key ? INK : 'var(--body)',\n        borderLeft: page === key ? '3px solid ' + RED : '3px solid transparent',\n        background: page === key ? 'var(--panel)' : 'transparent'\n      }\n    }));\n\n    const titles = { dashboard: 'DASHBOARD', myview: 'MY VIEW', match: 'MATCH', orphans: 'ORPHANS', recs: 'RECOMMENDATIONS', settings: 'SETTINGS' };\n\n    const tagStyles = {\n      match: { fontSize: '9.5px', letterSpacing: '1.2px', fontWeight: 700, background: INK, color: BG, padding: '4px 8px', whiteSpace: 'nowrap' },\n      orphan: { fontSize: '9.5px', letterSpacing: '1.2px', fontWeight: 700, background: RED, color: '#fff', padding: '4px 8px', whiteSpace: 'nowrap' },\n      error: { fontSize: '9.5px', letterSpacing: '1.2px', fontWeight: 700, border: '1px solid ' + RED, color: RED, padding: '3px 7px', whiteSpace: 'nowrap' }\n    };\n    const tagText = { match: 'HBIM MATCH', orphan: 'ORPHAN NEW', error: 'ERROR' };\n\n    const HISTORY = [\n      { d: '22 Jul 13:43', n: 'account_id', o: 'match', obj: 'customer account', prop: 'account identifier', c: 95 },\n      { d: '22 Jul 13:36', n: 'account_id', o: 'match', obj: 'customer account', prop: 'account identifier', c: 95 },\n      { d: '21 Jul 20:22', n: 'covenant_cancellation_notes', o: 'orphan', obj: '—', prop: 'no suitable property', c: null },\n      { d: '21 Jul 20:22', n: 'business_portfolio', o: 'match', obj: 'covenant', prop: 'business portfolio', c: 88 },\n      { d: '21 Jul 20:22', n: 'covenant_description', o: 'match', obj: 'covenant', prop: 'covenant description', c: 91 },\n      { d: '21 Jul 20:22', n: 'covenant_created_dt', o: 'match', obj: 'covenant', prop: 'creation date', c: 84 },\n      { d: '21 Jul 20:22', n: 'active_testing_testing_result', o: 'orphan', obj: '—', prop: 'no suitable property', c: null },\n      { d: '21 Jul 20:22', n: 'active_testing_testing_status', o: 'orphan', obj: '—', prop: 'no suitable property', c: null },\n      { d: '21 Jul 20:22', n: 'line_of_business_code', o: 'match', obj: 'party group', prop: 'line of business', c: 76 },\n      { d: '21 Jul 20:22', n: 'future_line_of_business', o: 'match', obj: 'party group', prop: 'future line of business', c: 72 },\n      { d: '20 Jul 17:05', n: 'counterparty_lei', o: 'match', obj: 'party group', prop: 'legal entity identifier', c: 93 },\n      { d: '20 Jul 17:05', n: 'risk_rating_internal', o: 'match', obj: 'customer', prop: 'internal risk rating', c: 64 },\n      { d: '20 Jul 16:58', n: 'acct_open_dt', o: 'error', obj: '—', prop: 'inference timeout', c: null }\n    ];\n    const filtered = HISTORY.filter(r => this.state.filter === 'all' || r.o === this.state.filter);\n    const visible = this.state.expanded ? filtered : filtered.slice(0, 8);\n    const historyRows = visible.map((r, i) => {\n      const low = r.c !== null && r.c < threshold;\n      return {\n        date: r.d, name: r.n, obj: r.obj, prop: r.prop,\n        tag: tagText[r.o], tagStyle: tagStyles[r.o],\n        conf: r.c === null ? '—' : r.c + '%',\n        confStyle: { fontSize: '12px', fontWeight: 700, fontVariantNumeric: 'tabular-nums', color: r.c === null ? SUB : (low ? RED : INK) },\n        barStyle: { display: 'block', height: '100%', width: (r.c || 0) + '%', background: low ? RED : INK },\n        style: {\n          display: 'grid', gridTemplateColumns: '110px 1.7fr 120px 1.4fr 150px', gap: '12px',\n          alignItems: 'center', padding: '13px 0', borderBottom: '1px solid var(--line2)',\n          background: zebra && i % 2 === 1 ? 'var(--panel)' : 'transparent'\n        }\n      };\n    });\n\n    const orphanTag = {\n      NEW: tagStyles.orphan,\n      'UNDER REVIEW': { fontSize: '9.5px', letterSpacing: '1.2px', fontWeight: 700, border: '1px solid ' + RED, color: RED, padding: '3px 7px', whiteSpace: 'nowrap' },\n      PROMOTED: tagStyles.match\n    };\n    const ORPHANS = [\n      { name: 'covenant_cancellation_notes', def: 'Free-text notes captured when a covenant is cancelled', src: 'CLM', raised: '21 Jul', st: 'NEW', sug: 'Cluster with covenant lifecycle fields.', rec: 'r2' },\n      { name: 'active_testing_testing_result', def: 'Result of the most recent active covenant test', src: 'QA Hub', raised: '21 Jul', st: 'NEW', sug: 'Candidate: new \"covenant testing\" object.', rec: 'r1' },\n      { name: 'active_testing_testing_status', def: 'Status of the active covenant testing cycle', src: 'QA Hub', raised: '21 Jul', st: 'NEW', sug: 'Candidate: new \"covenant testing\" object.', rec: 'r1' },\n      { name: 'branch_sort_code_legacy', def: 'Legacy 6-digit sort code retained from branch migration', src: 'CIB', raised: '18 Jul', st: 'UNDER REVIEW', sug: 'Possible alias of branch identifier.', rec: null },\n      { name: 'esg_screening_flag', def: 'Indicates counterparty passed ESG screening', src: 'Risk', raised: '15 Jul', st: 'PROMOTED', sug: 'Promoted to party group / esg screening status.', rec: null }\n    ];\n    const orphansFiltered = ORPHANS.filter(r => this.state.orphanFilter === 'all' || r.st === this.state.orphanFilter);\n    const orphanRows = orphansFiltered.map((r, i) => ({\n      ...r, tag: r.st, tagStyle: orphanTag[r.st],\n      goRec: () => this.setState({ page: 'recs' }),\n      linkStyle: r.rec ? { fontSize: '10.5px', letterSpacing: '1.2px', fontWeight: 700, color: RED, cursor: 'pointer', whiteSpace: 'nowrap' } : { display: 'none' },\n      style: {\n        display: 'grid', gridTemplateColumns: '1.6fr 2fr 80px 90px 130px 1.8fr', gap: '12px',\n        alignItems: 'center', padding: '14px 0', borderBottom: '1px solid var(--line2)',\n        background: zebra && i % 2 === 1 ? 'var(--panel)' : 'transparent'\n      }\n    }));\n\n    const RECS = [\n      { id: 'r1', no: '01', title: 'Create a \"covenant testing\" object with a \"testing status\" property', detail: 'Two orphans from QA Hub cluster on active covenant testing (testing_result, testing_status). No existing HBIM property covers test execution state.', meta: '2 ORPHANS · QA HUB · RAISED 21 JUL' },\n      { id: 'r2', no: '02', title: 'Add \"cancellation notes\" to the covenant object', detail: 'covenant_cancellation_notes is semantically adjacent to covenant lifecycle properties matched this week (creation date, covenant description).', meta: '1 ORPHAN · CLM · RAISED 21 JUL' },\n      { id: 'r3', no: '03', title: 'Register an alias for party group / line of business', detail: 'Three input variants (line_of_business_code, future_line_of_business, lob_cd) resolve to the same property. An alias would lift match confidence above 90%.', meta: '3 INPUTS · AVG CONFIDENCE 74%' }\n    ];\n    const statusStyles = {\n      accepted: { fontSize: '9.5px', letterSpacing: '1.2px', fontWeight: 700, background: INK, color: BG, padding: '4px 8px' },\n      dismissed: { fontSize: '9.5px', letterSpacing: '1.2px', fontWeight: 700, border: '1px solid ' + SUB, color: SUB, padding: '3px 7px' },\n      none: { display: 'none' }\n    };\n    const recRows = RECS.map(r => {\n      const st = this.state.recStatus[r.id] || 'none';\n      const decided = st !== 'none';\n      return {\n        ...r,\n        status: st === 'accepted' ? 'ACCEPTED' : st === 'dismissed' ? 'DISMISSED' : '',\n        statusStyle: statusStyles[st],\n        btnStyle: decided ? { display: 'none' } : { display: 'flex', gap: '10px' },\n        undoStyle: decided ? { fontSize: '10px', letterSpacing: '1.2px', fontWeight: 700, color: SUB, cursor: 'pointer' } : { display: 'none' },\n        accept: () => this.setState(s => ({ recStatus: { ...s.recStatus, [r.id]: 'accepted' } })),\n        dismiss: () => this.setState(s => ({ recStatus: { ...s.recStatus, [r.id]: 'dismissed' } })),\n        undo: () => this.setState(s => ({ recStatus: { ...s.recStatus, [r.id]: undefined } })),\n        goOrphans: () => this.setState({ page: 'orphans' })\n      };\n    });\n\n    const tabBase = { padding: '12px 22px', fontSize: '11px', letterSpacing: '1.6px', fontWeight: 700, cursor: 'pointer', userSelect: 'none', marginBottom: '-1px' };\n    const attrInputStyle = {\n      width: '100%', boxSizing: 'border-box', fontFamily: \"ui-monospace,'SF Mono',Menlo,monospace\",\n      fontSize: '13px', padding: '12px 14px', borderRadius: 0, outline: 'none', background: BG, color: INK,\n      border: this.state.attrError ? '1px solid ' + RED : '1px solid ' + INK,\n      boxShadow: this.state.attrError ? 'inset 0 -2px 0 ' + RED : 'none'\n    };\n\n    return {\n      nav,\n      theme, themeLabel: theme === 'dark' ? 'LIGHT MODE' : 'DARK MODE',\n      toggleTheme: () => this.setState({ themeOverride: theme === 'dark' ? 'light' : 'dark' }),\n      onThemeSelect: (e) => this.setState({ themeOverride: e.target.value }),\n      envLabel: this.props.envLabel ?? 'GB-SU-DEV',\n      pageTitle: titles[page],\n      isDashboard: page === 'dashboard', isMyview: page === 'myview', isMatch: page === 'match',\n      isOrphans: page === 'orphans', isRecs: page === 'recs', isSettings: page === 'settings',\n      filter: this.state.filter,\n      onFilter: (e) => this.setState({ filter: e.target.value, expanded: false }),\n      historyRows, shownCount: visible.length, filteredTotal: filtered.length,\n      hasMore: filtered.length > 8 && !this.state.expanded,\n      loadMore: () => this.setState({ expanded: true }),\n      orphanRows, orphanShown: orphansFiltered.length,\n      orphanFilter: this.state.orphanFilter,\n      onOrphanFilter: (e) => this.setState({ orphanFilter: e.target.value }),\n      recRows,\n      isSingle: this.state.tab === 'single', isBatch: this.state.tab === 'batch',\n      tabSingle: () => this.setState({ tab: 'single' }),\n      tabBatch: () => this.setState({ tab: 'batch' }),\n      tabSingleStyle: { ...tabBase, color: this.state.tab === 'single' ? INK : SUB, borderBottom: this.state.tab === 'single' ? '3px solid ' + RED : '3px solid transparent' },\n      tabBatchStyle: { ...tabBase, color: this.state.tab === 'batch' ? INK : SUB, borderBottom: this.state.tab === 'batch' ? '3px solid ' + RED : '3px solid transparent' },\n      submitted: this.state.submitted,\n      attrName: this.state.attrName, attrError: this.state.attrError, attrInputStyle,\n      onAttrName: (e) => this.setState({ attrName: e.target.value, attrError: false, submitted: false }),\n      onSubmit: () => {\n        if (!this.state.attrName.trim()) this.setState({ attrError: true, submitted: false });\n        else this.setState({ submitted: true, attrError: false });\n      },\n      batchName: this.state.batchName, hasBatch: !!this.state.batchName,\n      onBatchFile: (e) => { const f = e.target.files && e.target.files[0]; if (f) this.setState({ batchName: f.name }); },\n      onDrop: (e) => { e.preventDefault(); const f = e.dataTransfer.files && e.dataTransfer.files[0]; if (f) this.setState({ batchName: f.name }); },\n      onDragOver: (e) => e.preventDefault(),\n      settingsThreshold: String(threshold),\n      onThreshold: (e) => this.setState({ thresholdOverride: parseInt(e.target.value, 10) })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
